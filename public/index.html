<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>klike REPL</title>
    <style>
        body { font-family: monospace; margin: 0; display: flex; flex-direction: column; height: 100vh; background: #1e1e1e; color: #d4d4d4; }
        header { padding: 10px 20px; background: #333; border-bottom: 1px solid #444; display: flex; justify-content: space-between; align-items: center; }
        #container { flex: 1; display: flex; overflow: hidden; }
        #editor-container { flex: 1; display: flex; flex-direction: column; border-right: 1px solid #444; }
        #output-container { flex: 1; display: flex; flex-direction: column; background: #000; overflow-y: auto; padding: 20px; }
        textarea { flex: 1; background: transparent; color: #9cdcfe; border: none; padding: 20px; font-size: 16px; outline: none; resize: none; }
        button { background: #0e639c; color: white; border: none; padding: 8px 16px; cursor: pointer; border-radius: 2px; }
        button:hover { background: #1177bb; }
        table { border-collapse: collapse; background: #fff; color: #000; margin-top: 10px; }
        th, td { border: 1px solid #ccc; padding: 8px; text-align: left; }
        th { background: #eee; }
        .error { color: #f48771; }
        .prompt { color: #6a9955; margin-right: 8px; }
        .result-item { margin-bottom: 20px; border-bottom: 1px solid #333; padding-bottom: 10px; }
    </style>
</head>
<body>
    <header>
        <div><strong>klike</strong> Interactive REPL</div>
        <button id="run-btn">Run (Ctrl+Enter)</button>
    </header>
    <div id="container">
        <div id="editor-container">
            <textarea id="editor" spellcheck="false" placeholder="/ Type klike code here...
a: 1 2 3
a + 10"></textarea>
        </div>
        <div id="output-container">
            <div id="output"></div>
        </div>
    </div>
    <script>
        const editor = document.getElementById('editor');
        const output = document.getElementById('output');
        const runBtn = document.getElementById('run-btn');

        async function run() {
            const code = editor.value.trim();
            if (!code) return;

            const res = await fetch('/api/eval', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ code })
            });

            const data = await res.json();
            
            const item = document.createElement('div');
            item.className = 'result-item';
            
            const prompt = document.createElement('span');
            prompt.className = 'prompt';
            prompt.textContent = '>>';
            
            const val = document.createElement('div');
            if (data.error) {
                val.className = 'error';
                val.textContent = data.error;
            } else {
                if (data.result.startsWith('<table') || data.result.startsWith('<div')) {
                    val.innerHTML = data.result;
                } else {
                    val.textContent = data.result;
                }
            }
            
            item.appendChild(prompt);
            item.appendChild(val);
            output.insertBefore(item, output.firstChild);
        }

        runBtn.onclick = run;
        editor.onkeydown = (e) => {
            if (e.ctrlKey && e.key === 'Enter') {
                run();
            }
        };
    </script>
</body>
</html>
